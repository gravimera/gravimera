# Test-only config used by `tools/gen3d_real_test.py` (Gemini).
#
# This config intentionally keeps the Gemini API key out of the repo.
# Provide it via env `X_GOOG_API_KEY` when running the real test.

[scene]
scene_dat_path = "./scene.dat"

[automation]
enabled = true
# NOTE (Windows): some port ranges may be excluded/reserved by the OS; avoid 87xx.
bind = "127.0.0.1:18793"
disable_local_input = true
pause_on_start = true

[gen3d]
ai_service = "gemini"
cache_dir = "./cache/gen3d"
save_pass_screenshots = true
max_parallel_components = 6

[gemini]
base_url = "https://right.codes/gemini/v1beta"
model = "gemini-3-pro-preview"
X_GOOG_API_KEY = ""

