# Copy this file to `~/.gravimera/config.toml` and fill in your settings.
# NOTE: `config.toml` is gitignored in this repo to avoid committing secrets.

# Optional: override the base runtime data directory.
#
# Default: `~/.gravimera` (or env `GRAVIMERA_HOME`).
# If relative, it is resolved relative to this config file.
# root_dir = "~/.gravimera"

[log]

# Optional: override where the main log file is written.
# Default: `<root_dir>/gravimera.log`.
# Relative paths are resolved relative to the config file directory.
# If the path can't be opened, Gravimera logs a warning and falls back next to the running binary.
# Set to an empty string to disable file logging.
# path = "./gravimera.log"

# Optional: set log verbosity.
# Values: "error" | "warn" | "info" | "debug" | "trace"
# Note: some noisy engine-level debug logs (e.g. `cosmic_text` relayout / font fallback,
# `offset_allocator`, `bevy_shader::shader_cache`, `bevy_time::virt`) are suppressed unless you
# use "trace".
# Default: "info"
# level = "info"

[scene]

[intelligence_service]

# Optional: enable standalone brains via an intelligence service.
# See: `docs/intelligence_service.md` (spec: `docs/gamedesign/38_intelligence_service_spec.md`).
#
# Modes:
# - "embedded" (default): run the intelligence service inside the Gravimera process.
# - "sidecar": connect to a standalone `gravimera_intelligence_service` process (local/remote).
# - "disabled": hard-disable standalone brains (same as `enabled = false`).
#
# enabled = false
# mode = "embedded"
# addr = "127.0.0.1:8792" # sidecar addr; embedded bind addr (use "127.0.0.1:0" for a random port)
# token = "CHANGE_ME" # optional; requires `Authorization: Bearer <token>`
#
# Dev-only: spawn a demo commandable unit with a demo standalone brain (`demo.orbit.v1`).
# debug_spawn_unit = false

[automation]

# Optional: enable a local-only Automation HTTP API so tools/agents can drive the game
# (select/move/fire/mode/screenshot/shutdown) for automated testing.
# enabled = false

# Optional: bind address for the HTTP server (default: 127.0.0.1:8791).
# Note (Windows): some port ranges may be excluded/reserved by the OS. If you see a bind failure
# like `os error 10013`, pick a different port (example: 127.0.0.1:18791).
# bind = "127.0.0.1:8791"

# Optional: require `Authorization: Bearer <token>` on every request.
# token = "CHANGE_ME"

# Optional: local UI becomes read-only (camera + browsing allowed; mutations via API).
# monitor_mode = true

# Optional: ignore keyboard/mouse input while automation is enabled (default: false).
# disable_local_input = true

# Optional: start with time paused (default: false). Use the API to resume/step.
# pause_on_start = true

[ai]

# Optional: max seconds to wait for an AI backend to start sending a response body.
#
# This is applied as:
# - a "first-byte timeout" for Gen3D's streaming AI requests, and
# - a curl `--max-time` cap for Scene Build AI requests.
#
# Default: 240 (4 minutes).
# request_timeout_secs = 240

[gen3d]

# AI service used by Gen3D:
# - "openai" (default)
# - "mimo" (Xiaomi MiMo OpenAI-compatible Chat Completions)
# - "gemini"
# - "claude"
# ai_service = "openai"

# Gen3D orchestrator:
# - Pipeline-only (deterministic; tool sequence is engine-driven).
#   (The legacy agent-step orchestrator was removed.)
# orchestrator = "pipeline" # optional legacy key; ignored unless set to a non-pipeline value (then config errors)

# Optional: override where Gen3D artifacts are cached.
# Default: `<root_dir>/cache/gen3d/`.
# Relative paths are resolved relative to the config file directory.
# cache_dir = "./gen3d_cache"

# Optional: save a set of debug preview renders into every `attempt_N/pass_M/` folder.
# This makes it much easier to see how the draft changes over time while debugging.
# Default: enabled in debug builds; disabled in release builds (and in `cargo test`).
# save_pass_screenshots = true

# Optional: enable AI appearance review (uses preview renders + reference images).
# Default: false (structural-only review: fix validate/motion issues; avoid cosmetic regen/transform churn).
# review_appearance = false

# Optional: request Structured Outputs (strict JSON schema) for Gen3D schema-constrained calls
# (agent steps / plan / component drafts / review delta / etc).
#
# Notes:
# - Recommended: keep enabled when your backend truly enforces schemas (best reliability).
# - Some OpenAI-compatible gateways accept the schema fields but still emit multiple JSON objects;
#   Gen3D will warn and attempt a best-effort coercion to a single JSON object.
# Default: true.
# require_structured_outputs = true

# Max number of component generation requests to run in parallel (default: 10).
# Note: higher values can hit provider rate limits.
max_parallel_components = 10

# Budget: max wall-clock seconds per Build run (default: 1800). Set to 0 to disable the time budget.
# max_seconds = 1800

# Budget: max OpenAI tokens per Build run across all requests (default: 10000000). Set to 0 to disable the token budget.
# max_tokens = 10000000

# Budget: max number of `llm_review_delta_v1` calls per Gen3D run.
# Policy: capped to <= 2 to prevent oscillation.
# Values: 0..2 (0 disables review-delta).
# review_delta_rounds_max = 2

# No-progress guard: stop a Build run if the agent makes no observable progress.
#
# There are two independent budgets (set either to 0 to disable):
# - `no_progress_tries_max` (default: 3): steps that attempted to change the draft/meta (mutating tools),
#   but the assembled-state hash did not change.
# - `inspection_steps_max` (default: 12): steps that only inspected state (read-only / QA / tool lookup),
#   and the assembled-state hash did not change.
#
# no_progress_tries_max = 3
# inspection_steps_max = 12

# Budget: max number of replans per Build run (default: 1).
# max_replans = 1

# Budget: max number of component regenerations per Build run (default: 16).
# max_regen_total = 16

# Budget: max number of regenerations for any single component per Build run (default: 2).
# max_regen_per_component = 2

# Optional: number of auto-review passes after the initial build (0 disables auto-review).
# refine_iterations = 1

[openai]

# OpenAI Responses API base URL.
base_url = "https://api.openai.com/v1"

# Any Responses API model that supports images.
model = "gpt-5.4"

# Reasoning effort for all OpenAI-backed AI steps.
# Values: "none" | "low" | "medium" | "high"
reasoning_effort = "high"

# API token (OpenAI API key). Can also be provided via env `OPENAI_API_KEY`.
token = "YOUR_OPENAI_API_KEY_HERE"

[mimo]

# Xiaomi MiMo OpenAI-compatible Chat Completions base URL.
# Official endpoint:
base_url = "https://api.xiaomimimo.com/v1"

# Any supported MiMo model id (example below). See the MiMo Open Platform docs.
# Note: `mimo-v2-omni` supports image inputs (recommended for Gen3D reference photos).
model = "mimo-v2-omni"

# API token. Can also be provided via env `MIMO_API_KEY`.
token = "YOUR_MIMO_API_KEY_HERE"

[gemini]

# Gemini API base URL.
# Official endpoint:
base_url = "https://generativelanguage.googleapis.com/v1beta"

# Any Gemini model id (example below). See: https://ai.google.dev/gemini-api/docs/models
# Note: Gen3D schema-constrained calls use Structured Outputs (`response_json_schema`), so use a
# model that supports it (Gemini 2.0+).
model = "gemini-3.1-pro-preview"

# API token (sent as `x-goog-api-key`). Can also be provided via env `X_GOOG_API_KEY` / `GEMINI_API_KEY`.
token = "YOUR_GEMINI_API_KEY_HERE"

[claude]

# Claude Messages API base URL.
# Official endpoint:
base_url = "https://api.anthropic.com/v1"

# Any Claude model id (example below). See: https://docs.anthropic.com/claude/docs/models-overview
# Note: Gen3D schema-constrained calls use Structured Outputs (`output_config.format`), so use a
# model that supports it (Claude 4.5+ per Anthropic docs).
model = "claude-opus-4-5"

# API token (sent as `x-api-key`). Can also be provided via env `ANTHROPIC_API_KEY` / `CLAUDE_API_KEY`.
token = "YOUR_CLAUDE_API_KEY_HERE"
