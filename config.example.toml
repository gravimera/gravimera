# Copy this file to `~/.gravimera/config.toml` and fill in your settings.
# NOTE: `config.toml` is gitignored in this repo to avoid committing secrets.

# Optional: write logs to a file (in addition to the terminal).
# Relative paths are resolved relative to the config file directory.
# If the path can't be opened, Gravimera logs a warning and falls back next to the running binary.
# log_path = "./gravimera.log"

[scene]

# Optional: override where build scene persistence is stored.
# Default (active realm+scene): `~/.gravimera/realm/<realm_id>/scenes/<scene_id>/build/scene.dat`.
# Relative paths are resolved relative to the config file directory.
# scene_dat_path = "./scene.dat"

[intelligence_service]

# Optional: enable standalone brains via an intelligence service.
# See: `docs/intelligence_service.md` (spec: `docs/gamedesign/38_intelligence_service_spec.md`).
#
# Modes:
# - "embedded" (default): run the intelligence service inside the Gravimera process.
# - "sidecar": connect to a standalone `gravimera_intelligence_service` process (local/remote).
# - "disabled": hard-disable standalone brains (same as `enabled = false`).
#
# enabled = false
# mode = "embedded"
# addr = "127.0.0.1:8792" # sidecar addr; embedded bind addr (use "127.0.0.1:0" for a random port)
# token = "CHANGE_ME" # optional; requires `Authorization: Bearer <token>`
#
# Dev-only: spawn a demo commandable unit with a demo standalone brain (`demo.orbit.v1`).
# debug_spawn_unit = false

[automation]

# Optional: enable a local-only Automation HTTP API so tools/agents can drive the game
# (select/move/fire/mode/screenshot/shutdown) for automated testing.
# enabled = false

# Optional: bind address for the HTTP server (default: 127.0.0.1:8791).
# Note (Windows): some port ranges may be excluded/reserved by the OS. If you see a bind failure
# like `os error 10013`, pick a different port (example: 127.0.0.1:18791).
# bind = "127.0.0.1:8791"

# Optional: require `Authorization: Bearer <token>` on every request.
# token = "CHANGE_ME"

# Optional: ignore keyboard/mouse input while automation is enabled (default: true).
# disable_local_input = true

# Optional: start with time paused (default: true). Use the API to resume/step.
# pause_on_start = true

[gen3d]

# AI service used by Gen3D:
# - "openai" (default)
# - "gemini"
# ai_service = "openai"

# Optional: override where Gen3D artifacts are cached.
# Default: `~/.gravimera/cache/gen3d/`.
# Relative paths are resolved relative to the config file directory.
# cache_dir = "./gen3d_cache"

# Optional: save a set of debug preview renders into every `attempt_N/pass_M/` folder.
# This makes it much easier to see how the draft changes over time while debugging.
# Default: enabled in debug builds; disabled in release builds (and in `cargo test`).
# save_pass_screenshots = true

# Optional: enable AI appearance review (uses preview renders + reference images).
# Default: false (structural-only review: fix validate/motion issues; avoid cosmetic regen/transform churn).
# review_appearance = false

# Max number of component generation requests to run in parallel (default: 10).
# Note: higher values can hit provider rate limits.
max_parallel_components = 10

# Step-specific reasoning-effort caps for the Gen3D agent.
# Effective effort = min(openai.model_reasoning_effort, reasoning_effort_*).
# Values: "none" | "low" | "medium" | "high"
# reasoning_effort_plan = "high"
# reasoning_effort_agent_step = "low"
# reasoning_effort_component = "medium"
# reasoning_effort_review = "medium"
# reasoning_effort_repair = "low"

# Budget: max wall-clock seconds per Build run (default: 3600). Set to 0 to disable the time budget.
# max_seconds = 3600

# Budget: max OpenAI tokens per Build run across all requests (default: 10000000). Set to 0 to disable the token budget.
# max_tokens = 10000000

# No-progress guard: stop a Build run if the agent makes no observable progress for N steps.
# Set to 0 to disable the guard (default: 12).
# no_progress_max_steps = 12

# Budget: max number of replans per Build run (default: 1).
# max_replans = 1

# Budget: max number of component regenerations per Build run (default: 16).
# max_regen_total = 16

# Budget: max number of regenerations for any single component per Build run (default: 2).
# max_regen_per_component = 2

# Optional: number of auto-review passes after the initial build (0 disables auto-review).
# refine_iterations = 1

[openai]

# OpenAI Responses API base URL.
base_url = "https://api.openai.com/v1"

# Any Responses API model that supports images.
model = "gpt-4.1"

# "low" | "medium" | "high"
model_reasoning_effort = "high"

# API token (OpenAI API key). Can also be provided via env `OPENAI_API_KEY`.
token = "YOUR_OPENAI_API_KEY_HERE"

[gemini]

# Gemini API base URL.
# Right Codes proxy example: "https://right.codes/gemini/v1beta"
base_url = "https://right.codes/gemini/v1beta"

# Any Gemini model id. See: https://docs.right.codes/docs/rc_extension/curl.html#gemini
model = "gemini-3-pro-preview"

# API token (sent as `x-goog-api-key`). Can also be provided via env `X_GOOG_API_KEY` / `GEMINI_API_KEY`.
token = "YOUR_GEMINI_API_KEY_HERE"
